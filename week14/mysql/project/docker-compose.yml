version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql_learning
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: learning_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer_learning
    restart: always
    ports:
      - "8080:8080"

volumes:
  mysql_data:

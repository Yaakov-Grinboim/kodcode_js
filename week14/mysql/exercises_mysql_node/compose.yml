services:
  mysql:
    image: mysql:8.0
    container_name: mysql-exercises  
    ports:     
      - "3306:3306"                      
    environment:
      MYSQL_ROOT_PASSWORD: "123456"      
      MYSQL_DATABASE: "exercise"          
    volumes:
      - mysql_exercises_data:/var/lib/mysql

volumes:
  mysql_exercises_data:
